<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>File to QR Code Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9;}
        #qrcode-container { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px;}
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <h2>แปลงไฟล์เป็น QR Code (เวอร์ชันใช้งานจริง)</h2>
    <input type="file" id="fileInput" accept="image/*,video/*,audio/*">
    <button id="uploadBtn" onclick="uploadAndGenerate()">อัปโหลดและสร้าง QR Code</button>

    <div id="qrcode-container">
        <canvas id="qrcode"></canvas>
    </div>
    
    <p id="link-text" style="margin-top: 20px; font-weight: bold; word-break: break-all;"></p>

    <script>
        async function uploadAndGenerate() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) {
                alert('กรุณาเลือกไฟล์ก่อนครับ');
                return;
            }

            const file = fileInput.files[0];
            
            // ป้องกันไฟล์ใหญ่เกินไป ทำให้รอนาน
            if(file.size > 50 * 1024 * 1024) {
                alert('ไฟล์มีขนาดใหญ่เกินไป (แนะนำไม่เกิน 50MB เพื่อความรวดเร็วครับ)');
                return;
            }

            // เตรียมข้อมูลส่งไปที่ Catbox API
            const formData = new FormData();
            formData.append('reqtype', 'fileupload');
            formData.append('fileToUpload', file);

            const btn = document.getElementById('uploadBtn');
            btn.innerText = "กำลังอัปโหลดไฟล์... (รอสักครู่นะครับ)";
            btn.disabled = true;

            try {
                // ยิง API ไปที่ Catbox (ไม่ติดปัญหา CORS)
                const response = await fetch('https://catbox.moe/user/api.php', {
                    method: 'POST',
                    body: formData
                });
                
                // API ของ Catbox จะส่งลิงก์ URL จริงๆ กลับมาเป็นข้อความตรงๆ
                const fileUrl = await response.text();

                if (fileUrl.startsWith('https://')) {
                    // นำ URL จริงมาสร้างเป็น QR Code
                    const qr = new QRious({
                        element: document.getElementById('qrcode'),
                        value: fileUrl,
                        size: 250
                    });
                    
                    // แสดงลิงก์บนหน้าจอเผื่อคลิก
                    document.getElementById('link-text').innerHTML = `อัปโหลดสำเร็จ! <br><br> <a href="${fileUrl}" target="_blank">คลิกเพื่อดูไฟล์: ${fileUrl}</a>`;
                    
                } else {
                    alert('อัปโหลดไม่สำเร็จ โปรดลองอีกครั้งครับ');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์');
            } finally {
                // คืนค่าปุ่มกลับมาเหมือนเดิม
                btn.innerText = "อัปโหลดและสร้าง QR Code";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
